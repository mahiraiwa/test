<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>周囲の発熱者確認</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 162000: 疫学歴の確認 -->
<h1 id="行162000"></h1>

<!-- 162100: 同居している人、あるいは最近あなたと濃厚接触をした人の中で、同じように熱を出している人はいますか？ -->
<p id="行162100" style="margin-left: 1em;"></p>

<p>　</p>

<form>

<label>
<!-- 162200: います -->
<input type="radio" name="周囲発熱者" value="162200" checked>
<span id="行162200"></span>
</label>

<br><br>

<label>
<!-- 162300: いません -->
<input type="radio" name="周囲発熱者" value="162300">
<span id="行162300"></span>
</label>

<br><br>

<!-- 162400: 次へ -->
<button type="button" id="行162400" onclick="次へ()"></button>

</form>

<script src="dict.js"></script>

<script>
function 画面初期化(){
  [162000, 162100, 162200, 162300, 162400].forEach(function(番号){
    const 要素 = document.getElementById("行" + 番号);
    if(要素) 要素.textContent = 文字列取得(番号);
  });
}

function 次へ(){
  const 周囲発熱者 = document.querySelector('input[name="周囲発熱者"]:checked').value;
  localStorage.setItem("周囲発熱者", 周囲発熱者);
  location.href = "step5041.html";
}

画面初期化();
</script>

</body>
</html>
