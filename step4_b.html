<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>痛みの経過</title>
</head>

<body>

<h1>痛みの経過</h1>

<p id="表示文"></p>

<form>

<label>
<input type="radio" name="発症時期" value="数時間前から" checked>
数時間前から
</label>

<br><br>

<label>
<input type="radio" name="発症時期" value="24時間以内">
24時間以内
</label>

<br><br>

<label>
<input type="radio" name="発症時期" value="1日～数日前から">
1日～数日前から
</label>

<br><br>

<label>
<input type="radio" name="発症時期" value="1週間くらい前から">
1週間くらい前から
</label>

<br><br>

<label>
<input type="radio" name="発症時期" value="数週間前から">
数週間前から
</label>

<br><br>

<label>
<input type="radio" name="発症時期" value="1か月くらい前から">
1か月くらい前から
</label>

<br><br>

<label>
<input type="radio" name="発症時期" value="数か月前から">
数か月前から
</label>

<br><br>

<label>
<input type="radio" name="発症時期" value="半年以上前から">
半年以上前から
</label>

<br><br>

<label>
<input type="radio" name="発症時期" value="わからない">
わからない
</label>

<br><br>

<button type="button" onclick="次へ()">
次へ
</button>

</form>

<script>

//
// 痛みの場所取得（日本語キーのみ）
//

const 痛みの場所 =
JSON.parse(localStorage.getItem("痛み部位"));

const 最も痛い場所 =
localStorage.getItem("最重要痛み部位");

let 表示する痛みの場所 = "";

if (最も痛い場所) {

    表示する痛みの場所 = 最も痛い場所;

} else if (痛みの場所 && 痛みの場所.length === 1) {

    表示する痛みの場所 = 痛みの場所[0];

} else if (痛みの場所 && 痛みの場所.length > 1) {

    表示する痛みの場所 = 痛みの場所.join("・");

} else {

    表示する痛みの場所 = "痛み";
}

//
// 表示（文字列結合のみ）
//

document.getElementById("表示文").textContent =
表示する痛みの場所 + "が、初めて痛いと感じたのは、いつ頃からですか";

//
// 保存処理
//

function 次へ() {

const 発症時期 =
document.querySelector('input[name="発症時期"]:checked').value;

localStorage.setItem("発症時期", 発症時期);

localStorage.setItem("痛みの場所（確定）", 表示する痛みの場所);

location.href = "step5_b.html";

}

</script>

</body>
</html>
