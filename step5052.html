<script src="dict.js"></script>

<script>
function 画面初期化(){
  [160100, 160200, 160300, 160400, 160500, 160600, 160700, 160800, 160900, 161000, 161100].forEach(function(番号){
    const 要素 = document.getElementById("行" + 番号);
    if(要素) 要素.textContent = 文字列取得(番号);
  });
}

function 次へ(){
  const 持続時間 = document.querySelector('input[name="最初のめまいの持続時間"]:checked').value;
  localStorage.setItem("最初のめまいの持続時間", 持続時間);
  location.href = "step9_b.html";
}

</script>
