<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>食欲と食事量</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<style>
body {
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 300px;
  height: 300px;
  background-image: url("logob.jpg");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}
</style>
<!-- 100100: その他の確認事項 -->
<h1 id="行100100"></h1>
<!-- 100200: 主な症状以外についてお聞きします -->
<p id="行100200" style="margin-left: 1em;"></p>
<!-- 100300: 食欲はありますか -->
<p id="行100300" style="margin-left: 1em;"></p>
<form>
<p>　</p>
  <label>
<!-- 100400: 変わりない -->
<input type="radio" name="食欲" value="100400" checked>
<span id="行100400"></span>
</label>
<br><br>
<label>
<!-- 100500: 落ちた -->
<input type="radio" name="食欲" value="100500">
<span id="行100500"></span>
</label>
<br><br>
<hr>
<!-- 100600: 実際の食事量はどうですか -->
<p id="行100600" style="margin-left: 1em;"></p>
<p>　</p>
  <label>
<!-- 100700: いつもと変わらない -->
<input type="radio" name="食事量" value="100700" checked>
<span id="行100700"></span>
</label>
<br><br>
<label>
<!-- 100800: いつもより少しだけ減った -->
<input type="radio" name="食事量" value="100800">
<span id="行100800"></span>
</label>
<br><br>
<label>
<!-- 100900: いつもの半分くらい -->
<input type="radio" name="食事量" value="100900">
<span id="行100900"></span>
</label>
<br><br>
<label>
<!-- 101000: ほとんど食べられない -->
<input type="radio" name="食事量" value="101000">
<span id="行101000"></span>
</label>
<br><br>
<label>
<!-- 101100: 水分のみしか摂っていない -->
<input type="radio" name="食事量" value="101100">
<span id="行101100"></span>
</label>
<br><br>
<!-- 101200: 次へ -->
<button type="button" id="行101200" onclick="次へ()"></button>
</form>
<script src="dict.js"></script>
<script>
function 画面初期化(){
  [100100, 100200, 100300, 100400, 100500, 100600, 100700, 100800, 100900, 101000, 101100, 101200].forEach(function(番号){
    const 要素 = document.getElementById("行" + 番号);
    if(要素) 要素.textContent = 文字列取得(番号);
  });
}
function 次へ(){
  const 食欲 = document.querySelector('input[name="食欲"]:checked');
  const 食事量 = document.querySelector('input[name="食事量"]:checked');
  if(!食欲 || !食事量) return;
  localStorage.setItem("食欲", 食欲.value);
  localStorage.setItem("食事量", 食事量.value);
  location.href = "step510.html";
}
画面初期化();
</script>
</body>
</html>
