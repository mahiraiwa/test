<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>食欲と食事量</title>
</head>

<body>

<h1>痛み以外の症状</h1>

<p>（Step4の日以降）</p>

<p>痛み以外のことを教えてください</p>

<form>

<p>食欲はありますか</p>

<label>
<input type="radio" name="appetite" value="normal" checked>
変わりない
</label>

<br><br>

<label>
<input type="radio" name="appetite" value="decreased">
落ちた
</label>

<br><br>

<hr>

<p>実際の食事量はどうですか</p>

<label>
<input type="radio" name="intake" value="normal">
変わらない
</label>

<br><br>

<label>
<input type="radio" name="intake" value="slightly_less">
少しだけ減った
</label>

<br><br>

<label>
<input type="radio" name="intake" value="half">
半分くらい
</label>

<br><br>

<label>
<input type="radio" name="intake" value="poor">
ほとんど食べられない
</label>

<br><br>

<label>
<input type="radio" name="intake" value="liquid_only">
水分のみ
</label>

<br><br>

<button type="button">
次へ
</button>

</form>

</body>
</html>
