</label>

<br><br>

<label>
<input type="radio" name="course" value="better">
だんだん弱くなっている
</label>

<br><br>

<label>
<input type="radio" name="course" value="fluctuation">
波のように強くなったり弱くなったりしている

<button type="button">
次へ
</button>

</form>
