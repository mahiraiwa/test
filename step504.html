<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>痛みの経過</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 50100: 痛みの経過 -->
<h1 id="行50100"></h1>

<!-- 部位名（動的） -->
<p id="部位名表示" style="margin-bottom: 1em;"></p>
<!-- 50200: 初めて痛いと感じたのは、いつ頃からですか -->
<p id="行50200" style="margin-left: 1em;"></p>

<form>

<!-- 50300: 数時間前から -->
<label style="margin-top: 1em; display: block;">
<input type="radio" name="発症時期" value="50300" checked>
<span id="行50300"></span>
</label>

<br><br>

<!-- 50400: 24時間以内 -->
<label>
<input type="radio" name="発症時期" value="50400">
<span id="行50400"></span>
</label>

<br><br>

<!-- 50500: 1日～数日前から -->
<label>
<input type="radio" name="発症時期" value="50500">
<span id="行50500"></span>
</label>

<br><br>

<!-- 50600: 1週間くらい前から -->
<label>
<input type="radio" name="発症時期" value="50600">
<span id="行50600"></span>
</label>

<br><br>

<!-- 50700: 数週間前から -->
<label>
<input type="radio" name="発症時期" value="50700">
<span id="行50700"></span>
</label>

<br><br>

<!-- 50800: 1か月くらい前から -->
<label>
<input type="radio" name="発症時期" value="50800">
<span id="行50800"></span>
</label>

<br><br>

<!-- 50900: 数か月前から -->
<label>
<input type="radio" name="発症時期" value="50900">
<span id="行50900"></span>
</label>

<br><br>

<!-- 51000: 半年以上前から -->
<label>
<input type="radio" name="発症時期" value="51000">
<span id="行51000"></span>
</label>

<br><br>

<!-- 51100: わからない -->
<label>
<input type="radio" name="発症時期" value="51100">
<span id="行51100"></span>
</label>

<br><br>

<!-- 51200: 次へ -->
<button type="button" id="行51200" onclick="次へ()"></button>

</form>

<script src="dict.js"></script>

<script>
function 画面初期化(){
  // 固定テキスト
  [50100, 50200, 50300, 50400, 50500, 50600, 50700, 50800, 50900, 51000, 51100, 51200].forEach(function(番号){
    const 要素 = document.getElementById("行" + 番号);
    if(要素) 要素.textContent = 文字列取得(番号);
  });

  // 部位名を行番号から取得（1行目に表示）
  const 最重要部位行番号 = localStorage.getItem("最重要痛み部位");
  const 痛み部位一覧 = JSON.parse(localStorage.getItem("痛み部位") || "[]");

  let 部位テキスト = "";

  if(最重要部位行番号){
    部位テキスト = 文字列取得(Number(最重要部位行番号));
  } else if(痛み部位一覧.length === 1){
    部位テキスト = 文字列取得(Number(痛み部位一覧[0]));
  } else if(痛み部位一覧.length > 1){
    部位テキスト = 痛み部位一覧.map(function(番号){ return 文字列取得(Number(番号)); }).join("・");
  }

  document.getElementById("部位名表示").textContent = 部位テキスト;

  // 確定部位を保存（次のステップで使用）
  localStorage.setItem("痛みの場所（確定）", 部位テキスト);
}

function 次へ(){
  const 発症時期 = document.querySelector('input[name="発症時期"]:checked').value;
  localStorage.setItem("発症時期", 発症時期); // 行番号を保存
  location.href = "step5_b.html";
}

画面初期化();
</script>

</body>
</html>
