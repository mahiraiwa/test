<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>便通と睡眠</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<style>
body {
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 300px;
  height: 300px;
  background-image: url("logob.jpg");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}
</style>
<!-- 110100: 便通と睡眠 -->
<h1 id="行110100"></h1>
<!-- 110200: 便通（大便の出かた）に変化はありますか -->
<p id="行110200" style="margin-left: 1em;"></p>
<form>
<p>　</p>
<label>
<!-- 110300: いつもと違う便通（下痢、または、便秘） -->
<input type="radio" name="便通の変化" value="110300" checked>
<span id="行110300"></span>
</label>
<br><br>
<label>
<!-- 110400: いつもと同じ便通 -->
<input type="radio" name="便通の変化" value="110400">
<span id="行110400"></span>
</label>
<br><br>
<hr>
<!-- 110500: 睡眠に変化はありますか -->
<p id="行110500" style="margin-left: 1em;"></p>
<p>　</p>
<label>
<!-- 110600: いつも通りには眠れない -->
<input type="radio" name="睡眠の変化" value="110600" checked>
<span id="行110600"></span>
</label>
<br><br>
<label>
<!-- 110700: 睡眠はいつも通り -->
<input type="radio" name="睡眠の変化" value="110700">
<span id="行110700"></span>
</label>
<br><br>
<hr>
<!-- 120200: おしっこが出にくいですか（511より移動） -->
<p id="行120200" style="margin-left: 1em;"></p>
<p>　</p>
<label>
<!-- 120300: おしっこが出にくい -->
<input type="radio" name="排尿しにくい" value="120300">
<span id="行120300"></span>
</label>
<br><br>
<label>
<!-- 120400: おしっこの出はいつも通り -->
<input type="radio" name="排尿しにくい" value="120400" checked>
<span id="行120400"></span>
</label>
<br><br>
<hr>
<!-- 120500: おしっこが出るとき痛いですか（511より移動） -->
<p id="行120500" style="margin-left: 1em;"></p>
<p>　</p>
<label>
<!-- 120600: おしっこが出るとき、痛みがある -->
<input type="radio" name="排尿時痛" value="120600">
<span id="行120600"></span>
</label>
<br><br>
<label>
<!-- 120700: 痛みはない -->
<input type="radio" name="排尿時痛" value="120700" checked>
<span id="行120700"></span>
</label>
<br><br>
<!-- 110800: 詳しい内容は、あとで医師が確認します。 -->
<p id="行110800"></p>
<br>
<!-- 110900: 次へ -->
<button type="button" id="行110900" onclick="次へ()"></button>
</form>
<script src="dict.js"></script>
<script>
function 画面初期化(){
  [110100, 110200, 110300, 110400, 110500, 110600, 110700, 110800, 110900,
   120200, 120300, 120400, 120500, 120600, 120700].forEach(function(番号){
    const 要素 = document.getElementById("行" + 番号);
    if(要素) 要素.textContent = 文字列取得(番号);
  });
}
function 次へ(){
  const 便通の変化 = document.querySelector('input[name="便通の変化"]:checked');
  const 睡眠の変化 = document.querySelector('input[name="睡眠の変化"]:checked');
  const 排尿しにくい = document.querySelector('input[name="排尿しにくい"]:checked');
  const 排尿時痛 = document.querySelector('input[name="排尿時痛"]:checked');
  if(!便通の変化 || !睡眠の変化 || !排尿しにくい || !排尿時痛) return;
  localStorage.setItem("便通の変化", 便通の変化.value);
  localStorage.setItem("睡眠の変化", 睡眠の変化.value);
  localStorage.setItem("排尿しにくい", 排尿しにくい.value);
  localStorage.setItem("排尿時痛", 排尿時痛.value);
  location.href = "step5112.html";
}
画面初期化();
</script>
</body>
</html>
