<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>痛みの変化</title>
</head>

<body>

<h1>痛みの変化</h1>

<p>最初に痛みを感じてから今日までの経過を教えてください</p>

<p>痛みはどのように変化しましたか</p>

<form>

<label>
<input type="radio" name="痛みの変化" value="ずっと同じように痛い" checked>
ずっと同じように痛い
</label>

<br><br>

<label>
<input type="radio" name="痛みの変化" value="だんだん強くなっている">
だんだん強くなっている
</label>

<br><br>

<label>
<input type="radio" name="痛みの変化" value="だんだん弱くなっている">
だんだん弱くなっている
</label>

<br><br>

<label>
<input type="radio" name="痛みの変化" value="波のように強くなったり弱くなったりしている">
波のように強くなったり弱くなったりしている
</label>

<br><br>

<button type="button" onclick="次へ()">
次へ
</button>

</form>

<script>

function 次へ() {

const 選択項目 =
document.querySelector(
'input[name="痛みの変化"]:checked'
);

if (!選択項目) {

return;

}

localStorage.setItem(
"痛みの変化",
選択項目.value
);

location.href = "step7_b.html";

}

</script>

</body>
