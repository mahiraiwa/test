<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>痛みの部位</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 30100: 痛みの部位 -->
<h1 id="行30100"></h1>

<!-- 30200: どこが痛いのですか（複数選択可） -->
<p id="行30200"></p>

<form>

<!-- 30300: 頭 -->
<label>
<input type="checkbox" name="痛み部位" value="30300">
<span id="行30300"></span>
</label>

<br><br>

<!-- 30400: のど -->
<label>
<input type="checkbox" name="痛み部位" value="30400">
<span id="行30400"></span>
</label>

<br><br>

<!-- 30500: 首 -->
<label>
<input type="checkbox" name="痛み部位" value="30500">
<span id="行30500"></span>
</label>

<br><br>

<!-- 30600: 肩 -->
<label>
<input type="checkbox" name="痛み部位" value="30600">
<span id="行30600"></span>
</label>

<br><br>

<!-- 30700: 胸（前胸部、乳房） -->
<label>
<input type="checkbox" name="痛み部位" value="30700">
<span id="行30700"></span>
</label>

<br><br>

<!-- 30800: 腹部 -->
<label>
<input type="checkbox" name="痛み部位" value="30800">
<span id="行30800"></span>
</label>

<br><br>

<!-- 30900: 背部 -->
<label>
<input type="checkbox" name="痛み部位" value="30900">
<span id="行30900"></span>
</label>

<br><br>

<!-- 31000: 腰 -->
<label>
<input type="checkbox" name="痛み部位" value="31000">
<span id="行31000"></span>
</label>

<br><br>

<!-- 31100: 上肢（指、手首、肘） -->
<label>
<input type="checkbox" name="痛み部位" value="31100">
<span id="行31100"></span>
</label>

<br><br>

<!-- 31200: 下肢（足の指、足首、膝、足の付け根） -->
<label>
<input type="checkbox" name="痛み部位" value="31200">
<span id="行31200"></span>
</label>

<br><br>

<!-- 31300: その他 -->
<label>
<input type="checkbox" name="痛み部位" value="31300">
<span id="行31300"></span>
</label>

<br><br>

<!-- 31400: 次へ -->
<button type="button" id="行31400" onclick="次へ()"></button>

</form>

<script src="dict.js"></script>

<script>
function 画面初期化(){
  const 行番号一覧 = [30100,30200,30300,30400,30500,30600,30700,30800,30900,31000,31100,31200,31300,31400];
  行番号一覧.forEach(function(番号){
    const 要素 = document.getElementById("行" + 番号);
    if(要素) 要素.textContent = 文字列取得(番号);
  });
}

function 次へ(){
  const 選択部位 = [];
  document.querySelectorAll('input[name="痛み部位"]:checked').forEach(function(項目){
    選択部位.push(項目.value); // 行番号を保存
  });

  if(選択部位.length === 0){
    return;
  }

  localStorage.setItem("痛み部位", JSON.stringify(選択部位));

  if(選択部位.length === 1){
    location.href = "step4_b.html";
  } else {
    location.href = "step3_1b.html";
  }
}

画面初期化();
</script>

</body>
</html>
