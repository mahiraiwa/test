</head>

<body>

<h2 id="部位名表示"></h2>

<form>

<script src="dict.js"></script>

<script>
function 画面初期化(){
  [60100, 60200, 60300, 60400, 60500, 60600, 60700, 60800, 60900, 61000, 61100].forEach(function(番号){
    const 要素 = document.getElementById("行" + 番号);
    if(要素) 要素.textContent = 文字列取得(番号);
  });

  // 部位名を表示
  const 部位テキスト = localStorage.getItem("痛みの場所（確定）");
  if(部位テキスト){
    document.getElementById("部位名表示").textContent = 部位テキスト;
  }
}

function 次へ(){
  const 持続時間 = document.querySelector('input[name="持続時間"]:checked').value;
  localStorage.setItem("最初の痛みの持続時間", 持続時間);
  location.href = "step6_b.html";
}

画面初期化();
</script>
