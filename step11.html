<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>その他の健康情報</title>
</head>

<body>

<h1>その他の健康情報</h1>

<form>

<p>おしっこが出にくいですか</p>

<label><input type="radio" name="urine1" value="yes"> ある</label><br>
<label><input type="radio" name="urine1" value="no" checked> ない</label>

<br><br>

<p>おしっこが出るとき痛いですか</p>

<label><input type="radio" name="urine2" value="yes"> ある</label><br>
<label><input type="radio" name="urine2" value="no" checked> ない</label>

<br><br>

<p>最近、自分のいるところがどこなのかわからなくなったことはありますか</p>

<label><input type="radio" name="orientation" value="yes"> ある</label><br>
<label><input type="radio" name="orientation" value="no" checked> ない</label>

<br><br>

<p>最近、気を失ったことはありますか</p>

<label><input type="radio" name="syncope" value="yes"> ある</label><br>
<label><input type="radio" name="syncope" value="no" checked> ない</label>

<br><br>

<hr>

<p>二年以内に健康診断を受けたことはありますか</p>

<label><input type="radio" name="checkup" value="yes"> ある</label><br>
<label><input type="radio" name="checkup" value="no" checked> ない</label>

<br><br>

<p>ある場合は、その内容を後で医師が確認します。</p>

<br>

<p>今までに大きな病気をしたことがありますか</p>

<label><input type="radio" name="history" value="yes"> ある</label><br>
<label><input type="radio" name="history" value="no" checked> ない</label>

<br><br>

<p>ある場合は、その内容を後で医師が確認します。</p>

<br><br>

<button type="button">
終了
</button>

</form>

</body>
</html>
