<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>最初の痛みの持続時間</title>
</head>

<body>

<h1>最初の痛みの持続時間</h1>

<p>最初に痛みを感じた時の話を聞かせてください</p>

<p>その時の痛みはどのくらい続きましたか</p>

<form>

<label>
<input type="radio" name="duration" value="1min" checked>
1分間以内
</label>

<br><br>

<label>
<input type="radio" name="duration" value="10min">
10分間以内
</label>

<br><br>

<label>
<input type="radio" name="duration" value="1hour">
1時間以内
</label>

<br><br>

<label>
<input type="radio" name="duration" value="24hour">
24時間以内
</label>

<br><br>

<label>
<input type="radio" name="duration" value="1week">
1週間以内
</label>

<br><br>

<label>
<input type="radio" name="duration" value="ongoing">
1週間以上（今も最初の痛みが続いている）
</label>

<br><br>

<button type="button">
次へ
</button>

</form>

</body>
</html>
