<script src="dict.js"></script>

<script>
function 画面初期化(){
  [150100, 150200, 150300, 150400, 150500, 150600, 150700, 150800, 150900, 151000, 151100, 151200].forEach(function(番号){
    const 要素 = document.getElementById("行" + 番号);
    if(要素) 要素.textContent = 文字列取得(番号);
  });
}

function 次へ(){
  const 発症時期 = document.querySelector('input[name="発症時期"]:checked').value;
  localStorage.setItem("発症時期", 発症時期);
  location.href = "step5052.html";
}

画面初期化();
</script>
