<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>最も痛い部位</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 40100: 最も痛い部位 -->
<h1 id="行40100"></h1>

<!-- 40200: 複数の部位に痛みがあります。 -->
<!-- 40300: この中で最も痛い部位を選んでください。 -->
<p>
<span id="行40200"></span><br>
<span id="行40300"></span>
</p>

<form id="painForm">

<div id="部位一覧"></div>

<br>

<!-- 40400: 次へ -->
<button type="button" id="行40400" onclick="次へ()"></button>

</form>

<script src="dict.js"></script>

<script>
function 画面初期化(){
  // 固定テキスト
  [40100, 40200, 40300, 40400].forEach(function(番号){
    const 要素 = document.getElementById("行" + 番号);
    if(要素) 要素.textContent = 文字列取得(番号);
  });

  // localStorageから行番号一覧を取得し、ラジオボタンを動的生成
  const 痛み部位 = JSON.parse(localStorage.getItem("痛み部位"));
  const 部位一覧 = document.getElementById("部位一覧");

  痛み部位.forEach(function(行番号){
    const label = document.createElement("label");
    const テキスト = 文字列取得(Number(行番号)); // 行番号→選択言語のテキスト
    label.innerHTML =
      '<input type="radio" name="最重要痛み部位" value="' + 行番号 + '"> '
      + テキスト;
    部位一覧.appendChild(label);
    部位一覧.appendChild(document.createElement("br"));
    部位一覧.appendChild(document.createElement("br"));
  });
}

function 次へ(){
  const 選択 = document.querySelector('input[name="最重要痛み部位"]:checked');
  if(!選択){ return; }

  localStorage.setItem("最重要痛み部位", 選択.value); // 行番号を保存
  location.href = "step4_b.html";
}

画面初期化();
</script>

</body>
</html>
