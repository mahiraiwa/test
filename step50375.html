<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>最も強いしびれの部位</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 165100: 最も強いしびれの部位 -->
<h1 id="行165100"></h1>

<!-- 165200: 複数の部位にしびれがあります。 -->
<!-- 165300: この中で最も強くしびれている部位を選んでください。 -->
<p>
<span id="行165200"></span><br>
<span id="行165300"></span>
</p>

<form id="numbnessForm">

<div id="部位一覧"></div>

<br>

<!-- 164800: 次へ -->
<button type="button" id="行164800" onclick="次へ()"></button>

</form>

<script src="dict.js"></script>

<script>
function 画面初期化(){
  // 固定テキスト
  [165100, 165200, 165300, 164800].forEach(function(番号){
    const 要素 = document.getElementById("行" + 番号);
    if(要素) 要素.textContent = 文字列取得(番号);
  });

  // localStorageから行番号一覧を取得し、ラジオボタンを動的生成
  const しびれ部位一覧 = JSON.parse(localStorage.getItem("しびれ部位"));
  const 部位一覧 = document.getElementById("部位一覧");

  しびれ部位一覧.forEach(function(行番号){
    const label = document.createElement("label");
    const テキスト = 文字列取得(Number(行番号));
    label.innerHTML =
      '<input type="radio" name="最重要しびれ部位" value="' + 行番号 + '"> '
      + テキスト;
    部位一覧.appendChild(label);
    部位一覧.appendChild(document.createElement("br"));
    部位一覧.appendChild(document.createElement("br"));
  });
}

function 次へ(){
  const 選択 = document.querySelector('input[name="最重要しびれ部位"]:checked');
  if(!選択){ return; }

  localStorage.setItem("最重要しびれ部位", 選択.value); // 行番号を保存
  location.href = "step5041.html";
}

画面初期化();
</script>

</body>
</html>
