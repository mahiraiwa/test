<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>主訴選択</title>
</head>

<body>

<h1>主訴確認</h1>

<p>今回もっとも困っている症状は何ですか</p>

<form>

<label>
<input type="radio" name="chief" value="pain" checked>
痛み（頭痛、胸痛、腹痛、腰痛、関節痛、その他の部位の痛み）
</label>

<br><br>

<label>
<input type="radio" name="chief" value="fever">
発熱
</label>

<br><br>

<label>
<input type="radio" name="chief" value="edema">
浮腫（顔、四肢などの浮腫み）
</label>

<br><br>

<label>
<input type="radio" name="chief" value="rash">
発疹
</label>

<br><br>

<label>
<input type="radio" name="chief" value="dizziness">
めまい（視野が動いて目が回る、足がふらふらする、体がフアフアする、気を失いそうになる）
</label>

<br><br>

<label>
<input type="radio" name="chief" value="syncope">
気を失った
</label>

<br><br>

<label>
<input type="radio" name="chief" value="dyspnea">
息が苦しい
</label>

<br><br>

<label>
<input type="radio" name="chief" value="cough">
咳や痰が出る
</label>

<br><br>

<label>
<input type="radio" name="chief" value="nausea">
吐き気や嘔吐がある
</label>

<br><br>

<label>
<input type="radio" name="chief" value="numbness">
手足がしびれる
</label>

<br><br>

<label>
<input type="radio" name="chief" value="other">
その他
</label>

<br><br>

<button type="button" onclick="location.href='step3.html'">
次へ
</button>

</form>

</body>
</html>
