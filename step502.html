<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>主訴選択</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 20100: 主訴確認 -->
<h1 id="行20100"></h1>

<!-- 20200: 今回もっとも困っている症状は何ですか -->
<p id="行20200"></p>

<form>

<!-- 20300: 痛み -->
<label>
<input type="checkbox" name="主訴" value="20300">
<span id="行20300"></span>
</label>

<br><br>

<!-- 20400: 発熱 -->
<label>
<input type="checkbox" name="主訴" value="20400">
<span id="行20400"></span>
</label>

<br><br>

<!-- 20500: 浮腫 -->
<label>
<input type="checkbox" name="主訴" value="20500">
<span id="行20500"></span>
</label>

<br><br>

<!-- 20600: 皮膚の異常 -->
<label>
<input type="checkbox" name="主訴" value="20600">
<span id="行20600"></span>
</label>

<br><br>

<!-- 20700: めまい -->
<label>
<input type="checkbox" name="主訴" value="20700">
<span id="行20700"></span>
</label>

<br><br>

<!-- 20800: 気を失った、気が遠くなった -->
<label>
<input type="checkbox" name="主訴" value="20800">
<span id="行20800"></span>
</label>

<br><br>

<!-- 20900: 息が苦しい -->
<label>
<input type="checkbox" name="主訴" value="20900">
<span id="行20900"></span>
</label>

<br><br>

<!-- 21000: 咳や痰が出る -->
<label>
<input type="checkbox" name="主訴" value="21000">
<span id="行21000"></span>
</label>

<br><br>

<!-- 21100: 吐き気や嘔吐、食欲不振がある -->
<label>
<input type="checkbox" name="主訴" value="21100">
<span id="行21100"></span>
</label>

<br><br>

<!-- 21200: 手足がしびれる -->
<label>
<input type="checkbox" name="主訴" value="21200">
<span id="行21200"></span>
</label>

<br><br>

<!-- 21300: その他の症状 -->
<label>
<input type="checkbox" name="主訴" value="21300">
<span id="行21300"></span>
</label>

<br><br>

<!-- 21400: 次へ -->
<button type="button" id="行21400" onclick="主訴保存()"></button>

</form>

<!-- dict.jsを先に読み込む。辞書が存在してから初期化する -->
<script src="dict.js"></script>

<script>
// 起動時：選択言語で全テキストを表示
function 画面初期化(){
  const 行番号一覧 = [20100,20200,20300,20400,20500,20600,20700,20800,20900,21000,21100,21200,21300,21400];
  行番号一覧.forEach(function(番号){
    const 要素 = document.getElementById("行" + 番号);
    if(要素) 要素.textContent = 文字列取得(番号);
  });
}

// 次へボタン：行番号で主訴を保存し遷移
function 主訴保存(){
  const 選択結果 = [];
  document.querySelectorAll('input[name="主訴"]:checked').forEach(function(項目){
    選択結果.push(項目.value); // 行番号の文字列を保存
  });

  if(選択結果.length === 0){
    return;
  }

  localStorage.setItem("主訴一覧", JSON.stringify(選択結果));

  if(選択結果.length === 1){
    localStorage.setItem("最重要主訴", 選択結果[0]);

    if(選択結果[0] === "20300"){ // 痛み
      location.href = "step503.html";
    }
    else if(選択結果[0] === "20700"){ // めまい
      location.href = "step5042.html";
    }
    else{
      location.href = "step5041.html";
    }
  }
  else{
    location.href = "step5025.html";
  }
}

// 起動
画面初期化();
</script>

</body>
</html>
