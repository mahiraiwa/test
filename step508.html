<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>既往の痛みの有無</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 90100: 既往の痛みの有無 -->
<h1 id="行90100"></h1>

<p id="発症時期表示"></p>

<!-- 90200: 今回の痛みについてお聞きします -->
<p id="行90200" style="margin-left: 1em;"></p>
<!-- 90300: 痛みの強さは違っていても、以前に似たような痛みがありましたか -->
<p id="行90300" style="margin-left: 1em;"></p>
<!-- 90400: それとも人生で初めての痛みですか -->
<p id="行90400" style="margin-left: 1em;"></p>

<p>　</p>

<form>

<label>
<!-- 90500: 人生で初めての痛み -->
<input type="radio" name="過去に似た痛み" value="90500" checked>
<span id="行90500"></span>
</label>

<br><br>

<label>
<!-- 90600: 前にも似たような痛みがあった -->
<input type="radio" name="過去に似た痛み" value="90600">
<span id="行90600"></span>
</label>

<br><br>

<label>
<!-- 90700: わからない -->
<input type="radio" name="過去に似た痛み" value="90700">
<span id="行90700"></span>
</label>

<br><br>

<!-- 90800: 次へ -->
<button type="button" id="行90800" onclick="次へ()"></button>

</form>

<script src="dict.js"></script>

<script>
function 画面初期化(){
  [90100, 90200, 90300, 90400, 90500, 90600, 90700, 90800].forEach(function(番号){
    const 要素 = document.getElementById("行" + 番号);
    if(要素) 要素.textContent = 文字列取得(番号);
  });

  const 発症時期行番号 = localStorage.getItem("発症時期");
  if(発症時期行番号){
    document.getElementById("発症時期表示").textContent =
      "あなたは「" + 文字列取得(Number(発症時期行番号)) + "」から痛みがあると回答しました。";
  }
}

function 次へ(){
  const 過去に似た痛み = document.querySelector('input[name="過去に似た痛み"]:checked').value;
  localStorage.setItem("過去に似た痛み", 過去に似た痛み);
  location.href = "step509.html";
}

画面初期化();
</script>

</body>
</html>
