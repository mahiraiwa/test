<head>
<meta charset="UTF-8">
<title>痛みの経過</title>
</head>

<body>

<h1>痛みの経過</h1>

<p>初めて「痛い」と思ったのはいつ頃からですか</p>

<form>

<label>
<input type="radio" name="onset" value="hours" checked>
数時間前から
</label>

<br><br>

<label>
<input type="radio" name="onset" value="24h">
24時間以内
</label>

<br><br>

<label>
<input type="radio" name="onset" value="days">
1日～数日前から
</label>

<br><br>

<label>
<input type="radio" name="onset" value="week">
1週間くらい前から
</label>

<br><br>

<label>
<input type="radio" name="onset" value="weeks">
数週間前から
</label>

<br><br>

<label>
<input type="radio" name="onset" value="month">
1か月くらい前から
</label>

<br><br>

<label>
<input type="radio" name="onset" value="months">
数か月前から
</label>

<br><br>

<label>
<input type="radio" name="onset" value="halfyear">
半年以上前から
</label>

<br><br>

<label>
<input type="radio" name="onset" value="unknown">
わからない
</label>

<br><br>

<button type="button">
次へ
</button>

</form>

</body>
</html>
