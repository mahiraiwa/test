<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>主訴選択</title>
</head>

<body>

<h1>主訴確認</h1>

<p>今回もっとも困っている症状は何ですか</p>

<form>

<label>
<input type="radio" name="chief" value="pain" checked>
痛み
</label>

<br><br>

<label>
<input type="radio" name="chief" value="fever" disabled>
発熱
</label>

<br><br>

<label>
<input type="radio" name="chief" value="cough" disabled>
咳
</label>

<br><br>

<label>
<input type="radio" name="chief" value="dyspnea" disabled>
息苦しさ
</label>

<br><br>

<label>
<input type="radio" name="chief" value="diarrhea" disabled>
下痢
</label>

<br><br>

<label>
<input type="radio" name="chief" value="other" disabled>
その他
</label>

<br><br>

<button type="button" onclick="location.href='step3.html'">
次へ
</button>

</form>

</body>
</html>
