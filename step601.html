<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>問診まとめ</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
<style>
body {
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 300px;
  height: 300px;
  background-image: url("logob.jpg");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}
.質問行 {
  margin: 0.8em 0 0.1em 0;
  font-size: 0.85em;
  color: #555;
}
.回答行 {
  margin: 0 0 0 1.5em;
  font-weight: bold;
}
#QRエリア {
  margin: 1.5em 0;
  text-align: center;
}
@media print {
  button { display: none; }
  body::before { display: none; }
}
</style>

<h1 id="見出し母国語"></h1>
<div id="まとめ母国語"></div>

<hr>

<h1 id="見出し日本語"></h1>
<div id="まとめ日本語"></div>

<hr>

<div id="QRエリア">
  <div id="QRコード"></div>
</div>

<br>

<button type="button" onclick="window.print()">印刷</button>
&nbsp;&nbsp;
<button type="button" onclick="やり直し()">やり直し</button>

<script src="dict.js"></script>
<script>

// キー名（日本語）→ 質問行番号のマッピング
const キー質問番号 = {
  "主訴":             20200,
  "痛み部位":         30200,
  "最重要痛み部位":   40300,
  "痛み開始時期":     50200,
  "最初の痛みの持続時間": 60300,
  "痛みの変化":       70300,
  "悪化する姿勢や動作": 80200,
  "楽になる姿勢や動作": 80600,
  "過去に似た痛み":   90300,
  "食欲":             100300,
  "食事量":           100600,
  "便通の変化":       110200,
  "睡眠の変化":       110500,
  "排尿しにくい":     120200,
  "排尿時痛":         120500,
  "場所がわからなくなった": 120800,
  "失神":             121100,
  "健康診断受診":     121400,
  "大きな病気の既往": 121800,
};

function 問診結果取得() {
  const 結果 = [];
  for (let i = 0; i < localStorage.length; i++) {
    const キー = localStorage.key(i);
    if (キー === "選択言語") continue;
    const 値 = localStorage.getItem(キー);
    const 行番号 = parseInt(値);
    if (!isNaN(行番号) && String(行番号) === 値) {
      結果.push({ キー: キー, 値: 行番号 });
    }
  }
  結果.sort(function(a, b) { return a.値 - b.値; });
  return 結果;
}

function まとめ表示() {
  const 言語 = localStorage.getItem("選択言語") || "ja";
  const 結果 = 問診結果取得();

  document.getElementById("見出し母国語").textContent =
    文字列取得(130200);
  document.getElementById("見出し日本語").textContent =
    辞書[130200]["ja"];

  function エリアに追加(エリア, lang) {
    結果.forEach(function(項目) {
      // 質問
      const 質問番号 = キー質問番号[項目.キー];
      if (質問番号) {
        const 質問行 = document.createElement("p");
        質問行.className = "質問行";
        質問行.textContent = 辞書[質問番号]
          ? (辞書[質問番号][lang] || 辞書[質問番号]["ja"])
          : 項目.キー;
        エリア.appendChild(質問行);
      }
      // 回答
      const 回答行 = document.createElement("p");
      回答行.className = "回答行";
      回答行.textContent = 辞書[項目.値]
        ? (辞書[項目.値][lang] || 辞書[項目.値]["ja"])
        : 項目.値;
      エリア.appendChild(回答行);
    });
  }

  エリアに追加(document.getElementById("まとめ母国語"), 言語);
  エリアに追加(document.getElementById("まとめ日本語"), "ja");

  // QRコード生成
  const QRデータ = 結果.map(function(項目) {
    return 項目.値;
  }).join(",");

  new QRCode(document.getElementById("QRコード"), {
    text: QRデータ,
    width: 256,
    height: 256,
  });
}

function やり直し() {
  localStorage.clear();
  location.href = "index500b.html";
}

まとめ表示();

</script>
</body>
</html>
