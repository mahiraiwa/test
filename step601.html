<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>問診まとめ</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
<style>
body {
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 300px;
  height: 300px;
  background-image: url("logob.jpg");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: center;
  opacity: 0.15;
  pointer-events: none;
  z-index: 0;
}
.質問行 {
  margin: 0.8em 0 0.1em 0;
  font-size: 0.85em;
  color: #555;
}
.回答行 {
  margin: 0 0 0 1.5em;
  font-weight: bold;
}
#QRエリア {
  margin: 1.5em 0;
  text-align: center;
}
@media print {
  button { display: none; }
  body::before { display: none; }
}
</style>

<h1 id="見出し母国語"></h1>
<div id="まとめ母国語"></div>

<hr>

<h1 id="見出し日本語"></h1>
<div id="まとめ日本語"></div>

<hr>

<div id="QRエリア">
  <div id="QRコード"></div>
</div>

<br>

<button type="button" onclick="window.print()">印刷</button>
&nbsp;&nbsp;
<button type="button" onclick="やり直し()">やり直し</button>

<script src="dict.js"></script>
<script>

// キー名→質問行番号マッピング
const キー質問番号 = {
  "主訴一覧":             20200,
  "最重要主訴":           22300,
  "痛み部位":             30200,
  "最重要痛み部位":       40100,
  "痛み開始時期":         50200,
  "最初の痛みの持続時間": 60300,
  "痛みの変化":           70300,
  "悪化する姿勢や動作":   80200,
  "楽になる姿勢や動作":   80600,
  "過去に似た痛み":       90300,
  "発症時期":             140200,
  "食欲":                 100300,
  "食事量":               100600,
  "便通の変化":           110200,
  "睡眠の変化":           110500,
  "排尿しにくい":         120200,
  "排尿時痛":             120500,
  "場所がわからなくなった": 120800,
  "失神":                 121100,
  "健康診断受診":         121400,
  "大きな病気の既往":     121800,
   "最初のめまいの持続時間": 160300,
};

// 表示順（キー名の順序を行番号で制御）
const 表示順 = [
  "主訴一覧",
  "最重要主訴",
  "痛み部位",
  "最重要痛み部位",
  "痛み開始時期",
  "最初の痛みの持続時間",
  "痛みの変化",
  "悪化する姿勢や動作",
  "楽になる姿勢や動作",
  "過去に似た痛み",
  "発症時期",
  "食欲",
  "食事量",
  "便通の変化",
  "睡眠の変化",
  "排尿しにくい",
  "排尿時痛",
  "場所がわからなくなった",
  "失神",
  "健康診断受診",
  "大きな病気の既往",
    "最初のめまいの持続時間",
];

function テキスト取得(行番号, lang) {
  if (!辞書[行番号]) return String(行番号);
  return 辞書[行番号][lang] || 辞書[行番号]["ja"];
}

function エリアに追加(エリア, lang) {
  表示順.forEach(function(キー) {
    const 値 = localStorage.getItem(キー);
    if (!値) return;

    const 質問番号 = キー質問番号[キー];
    const 質問行 = document.createElement("p");
    質問行.className = "質問行";
    質問行.textContent = 質問番号
      ? テキスト取得(質問番号, lang)
      : キー;
    エリア.appendChild(質問行);

    // JSON配列（主訴一覧・痛み部位）の処理
    let 解析済み = null;
    try { 解析済み = JSON.parse(値); } catch(e) {}

    if (Array.isArray(解析済み)) {
      解析済み.forEach(function(行番号) {
        const 回答行 = document.createElement("p");
        回答行.className = "回答行";
        回答行.textContent = テキスト取得(Number(行番号), lang);
        エリア.appendChild(回答行);
      });
    } else {
      const 行番号 = parseInt(値);
      const 回答行 = document.createElement("p");
      回答行.className = "回答行";
      回答行.textContent = (!isNaN(行番号) && String(行番号) === 値)
        ? テキスト取得(行番号, lang)
        : 値;
      エリア.appendChild(回答行);
    }
  });
}

function QR用行番号収集() {
  const 行番号一覧 = [];
  表示順.forEach(function(キー) {
    const 値 = localStorage.getItem(キー);
    if (!値) return;
    let 解析済み = null;
    try { 解析済み = JSON.parse(値); } catch(e) {}
    if (Array.isArray(解析済み)) {
      解析済み.forEach(function(n) { 行番号一覧.push(n); });
    } else {
      const 行番号 = parseInt(値);
      if (!isNaN(行番号) && String(行番号) === 値) {
        行番号一覧.push(値);
      }
    }
  });
  return 行番号一覧;
}

function まとめ表示() {
  const 言語 = localStorage.getItem("選択言語") || "ja";

  document.getElementById("見出し母国語").textContent =
    テキスト取得(130200, 言語);
  document.getElementById("見出し日本語").textContent =
    テキスト取得(130200, "ja");

  エリアに追加(document.getElementById("まとめ母国語"), 言語);
  エリアに追加(document.getElementById("まとめ日本語"), "ja");

  const QRデータ = QR用行番号収集().join(",");
  new QRCode(document.getElementById("QRコード"), {
    text: QRデータ,
    width: 256,
    height: 256,
  });
}

function やり直し() {
  localStorage.clear();
  location.href = "index500b.html";
}

まとめ表示();

</script>
</body>
</html>
